name: Release crawler-api + config-backend

on:
  push:
    tags:
      - 'crawler-api/v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (e.g., v4.1.2)'
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/crawler-api/}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Build and push crawler-api
        uses: docker/build-push-action@v6
        with:
          context: ./apps/crawler-api
          file: ./apps/crawler-api/Dockerfile
          push: true
          tags: |
            ggwujun/crawler-api:latest
            ggwujun/crawler-api:${{ steps.meta.outputs.tag }}
            ggwujun/crawler-api:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Build and push config-backend
        uses: docker/build-push-action@v6
        with:
          context: ./apps/config-backend
          file: ./apps/config-backend/Dockerfile
          push: true
          tags: |
            ggwujun/config-backend:latest
            ggwujun/config-backend:${{ steps.meta.outputs.tag }}
            ggwujun/config-backend:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
