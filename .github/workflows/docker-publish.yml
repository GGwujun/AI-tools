# 构建并推送 jiu9 crawler-api 镜像到两个 registry：
#   - ghcr.io/ggwujun/crawler-api  (多架构 amd64+arm64, 用 buildx)
#   - 阿里云 ACR (仅 amd64, 用原生 docker build/push —— buildx 对个人版 ACR 有兼容问题)
#
# 触发:
#   - push 到 master → :latest + :sha (供测试)
#   - 版本 tag (v*) → :<version> (正式发布)
#   - 手动 workflow_dispatch
#
# 需在仓库 Settings → Secrets 配置 (照搬 SigmX 仓库):
#   - ALIYUN_REGISTRY_USERNAME  阿里云 ACR 账号
#   - ALIYUN_REGISTRY_PASSWORD  阿里云 ACR 固定访问密码
# ghcr 用自带 GITHUB_TOKEN，无需额外配置。

name: Build & Publish Docker Images

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

env:
  GHCR_REGISTRY: ghcr.io
  ALIYUN_REGISTRY: crpi-i6pwsm2rbcu2h5uv.cn-shenzhen.personal.cr.aliyuncs.com
  ALIYUN_NAMESPACE: ggwujun

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: crawler-api
            context: ./apps/crawler-api
            dockerfile: ./apps/crawler-api/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tags
        id: tags
        run: |
          tags=""
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VER="${GITHUB_REF_NAME}"
            tags="${VER},${VER#v},latest"
          else
            tags="latest,sha-${GITHUB_SHA::7}"
          fi
          echo "tags=$tags" >> $GITHUB_OUTPUT
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # ============ ghcr.io (多架构, 用 buildx) ============
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push to ghcr (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ steps.tags.outputs.owner }}/${{ matrix.app }}:${{ github.ref_name == 'master' && 'latest' || github.ref_name }}
          cache-from: type=gha,scope=${{ matrix.app }}-ghcr
          cache-to: type=gha,scope=${{ matrix.app }}-ghcr,mode=max

      # ============ 阿里云 ACR (仅 amd64, 用原生 docker 避开 buildx 兼容问题) ============
      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build & push to Aliyun ACR (amd64)
        run: |
          cd ${{ matrix.context }}
          IFS=',' read -ra TAG_LIST <<< "${{ steps.tags.outputs.tags }}"
          for t in "${TAG_LIST[@]}"; do
            echo "Building and pushing ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ matrix.app }}:$t"
            docker build -f Dockerfile -t ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ matrix.app }}:$t .
            docker push ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ matrix.app }}:$t
          done
