# 构建并推送 jiu9 两个后端镜像到两个 registry：
#   - ghcr.io/ggwujun/crawler-api | config-backend  (多架构 amd64+arm64)
#   - 阿里云 ACR (仅 amd64，个人版不支持多架构，国内服务器是 amd64)
#
# 触发:
#   - push 到 master → :latest + :sha (供测试)
#   - 版本 tag (v*) → :<version> (正式发布)
#   - 手动 workflow_dispatch
#
# 需在仓库 Settings → Secrets 配置 (照搬 SigmX 仓库):
#   - ALIYUN_REGISTRY_USERNAME  阿里云 ACR 账号
#   - ALIYUN_REGISTRY_PASSWORD  阿里云 ACR 固定访问密码
# ghcr 用自带 GITHUB_TOKEN，无需额外配置。

name: Build & Publish Docker Images

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

env:
  GHCR_REGISTRY: ghcr.io
  ALIYUN_REGISTRY: crpi-i6pwsm2rbcu2h5uv.cn-shenzhen.personal.cr.aliyuncs.com
  ALIYUN_NAMESPACE: ggwujun

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: crawler-api
            context: ./apps/crawler-api
            dockerfile: ./apps/crawler-api/Dockerfile
          - app: config-backend
            context: ./apps/config-backend
            dockerfile: ./apps/config-backend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---------- 版本号 ----------
      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ matrix.app }}
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ matrix.app }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=ref,event=tag

      # ---------- ghcr.io (多架构) ----------
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push to ghcr (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}-ghcr
          cache-to: type=gha,scope=${{ matrix.app }}-ghcr,mode=max

      # ---------- 阿里云 ACR (仅 amd64) ----------
      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build & push to Aliyun ACR (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.app }}-aliyun
          cache-to: type=gha,scope=${{ matrix.app }}-aliyun,mode=max
