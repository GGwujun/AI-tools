services:
  crawler-api:
    image: ${CRAWLER_API_IMAGE:-ggwujun/crawler-api:latest}
    container_name: crawler-api
    restart: always
    ports:
      - "${CRAWLER_API_PORT:-8091}:8091"
    volumes:
      - ./config/config.yaml:/app/config.yaml:ro
      - ./config/crawlers/douyin/web/config.yaml:/app/crawlers/douyin/web/config.yaml:ro
      - ./config/crawlers/tiktok/web/config.yaml:/app/crawlers/tiktok/web/config.yaml:ro
      - ./config/crawlers/tiktok/app/config.yaml:/app/crawlers/tiktok/app/config.yaml:ro
      - ./config/crawlers/bilibili/web/config.yaml:/app/crawlers/bilibili/web/config.yaml:ro
      - ./config/crawlers/kuaishou/web/config.yaml:/app/crawlers/kuaishou/web/config.yaml:ro
      - ./config/crawlers/xiaohongshu/web/config.yaml:/app/crawlers/xiaohongshu/web/config.yaml:ro
      - ./config/crawlers/weibo/web/config.yaml:/app/crawlers/weibo/web/config.yaml:ro
      - ./download:/app/download
      - ./logs:/app/logs
    environment:
      TZ: Asia/Shanghai
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
